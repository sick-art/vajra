site_name: VAJRA — VectorHouse
site_description: Data Virtualization & Governance Platform for Vector Databases
site_author: VectorHouse Team
docs_dir: docs
site_dir: site

repo_name: sick-art/vajra
repo_url: https://github.com/sick-art/vajra
site_url: http://aartityagi.in/vajra/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - excalidraw

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
    - System Overview: architecture/overview.md
    - Components: architecture/components.md
    - Deployment: architecture/deployment.md
  - Pipelines:
    - Ingest Pipeline: pipelines/ingest.md
    - Query Pipeline: pipelines/query.md
    - Evaluation Pipeline: pipelines/eval.md
  - API Reference:
    - Collections: api/collections.md
    - Ingest: api/ingest.md
    - Query: api/query.md
    - Workflows: api/workflows.md
    - Evaluation: api/eval.md
  - Concepts:
    - Data Contracts: concepts/data-contracts.md
    - Vector Store Adapters: concepts/adapters.md
    - Governance & Audit: concepts/governance.md
  - Configuration: configuration.md
  - Deployment Guide: deployment.md
  - Development Guide: development.md

extra_css:
  - assets/excalidraw-light-mode.css

extra_javascript:
  - assets/excalidraw-light-mode.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sick-art/vajra
